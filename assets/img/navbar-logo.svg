<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
    
    <!-- Globe -->
    <circle cx="500" cy="300" r="180" stroke="#FFFFFF" stroke-width="8" fill="none"/>
    
    <!-- Latitude lines -->
    <ellipse cx="500" cy="300" rx="160" ry="60" stroke="#FFFFFF" stroke-width="4" fill="none"/>
    <ellipse cx="500" cy="300" rx="160" ry="120" stroke="#FFFFFF" stroke-width="4" fill="none"/>
    
    <!-- Longitude lines -->
    <ellipse cx="500" cy="300" rx="60" ry="160" stroke="#FFFFFF" stroke-width="4" fill="none"/>
    <ellipse cx="500" cy="300" rx="120" ry="160" stroke="#FFFFFF" stroke-width="4" fill="none"/>
    
    <!-- Airplane -->
    <polygon points="650,200 820,140 780,200 820,260" fill="#FFFFFF"/>
    
    <!-- Ship -->
    <polygon points="350,430 650,430 600,470 400,470" fill="#FFFFFF"/>
    <rect x="430" y="380" width="140" height="50" fill="#FFFFFF"/>
    
    <!-- Company Name -->
    <text x="500" y="560" font-family="Arial, Helvetica, sans-serif" 
          font-size="60" font-weight="bold" text-anchor="middle" fill="#FFFFFF">
        S S ENTERPRISES
    </text>
    
    <!-- Services Line -->
    <text x="500" y="620" font-family="Arial, Helvetica, sans-serif" 
          font-size="30" text-anchor="middle" fill="#FFFFFF">
        EXPORT • IMPORT • SERVICE
    </text>
    
    <!-- Tagline -->
    <text x="500" y="670" font-family="Arial, Helvetica, sans-serif" 
          font-size="24" text-anchor="middle" fill="#FFFFFF">
        Quality Products. Reliable Exports. Long-Term Partnerships.
    </text>

</svg>
